<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Diamond X</title>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00C9A7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
    <style>
        #app { background-color: var(--dx-bg); min-height: 100vh; }
    </style>
</head>
<body>
    <div id="app">
        <!-- SPA Shell -->
        <main id="main-content">
            <div style="display: flex; align-items: center; justify-content: center; height: 80vh; color: var(--dx-muted);">
                <p>Carregando Diamond X...</p>
            </div>
        </main>
        
        <nav id="bottom-nav" class="hidden">
            <!-- Dynamic navigation based on user role -->
        </nav>
        
        <div id="toasts-container"></div>
    </div>

    <!-- Scripts -->
    <script>
        window.addEventListener('error', function(e) {
            console.error('Global Error:', e.message, 'at', e.filename, ':', e.lineno);
            if (e.message.includes('SyntaxError')) {
                document.getElementById('main-content').innerHTML = `
                    <div style="padding: 20px; color: white; text-align: center;">
                        <h2 style="color: var(--dx-danger);">Erro de Carregamento</h2>
                        <p>Houve um problema ao carregar os componentes do sistema.</p>
                        <p style="font-size: 12px; color: var(--dx-muted); margin-top: 10px;">${e.message}</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top: 20px; width: auto; padding: 10px 20px;">Tentar Novamente</button>
                    </div>
                `;
            }
        }, true);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="/js/supabase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js');
            });
        }
    </script>
</body>
</html>
