# Configuração das Edge Functions do Diamond X.
# Ambas as funções abaixo desativam a verificação automática de JWT do gateway
# porque autenticam o chamador por conta própria:
#  - asaas-checkout: valida o Bearer do usuário via supabase.auth.getUser(token).
#  - asaas-webhook:  valida o header asaas-access-token contra ASAAS_WEBHOOK_TOKEN.

[functions.asaas-checkout]
verify_jwt = false

[functions.asaas-webhook]
verify_jwt = false

[functions.admin-update-user]
# Mantém o comportamento padrão (verifica JWT do Supabase) — admin route.
verify_jwt = true
