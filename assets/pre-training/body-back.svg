<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
    <style>
        .bg { fill: #000000; }
        .body-base { fill: #ffffff; }
        .body-line { stroke: #ffffff; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        .body-detail { stroke: #000000; stroke-width: 4; stroke-linecap: round; fill: none; }
        .hair { fill: #1f2937; }
        .line { stroke: #9ca3af; stroke-width: 3; fill: none; }
        .dot { fill: #9ca3af; r: 6; }
        .box { fill: #9ca3af; rx: 20; height: 40px; }
        .txt { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
        .title { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 28px; font-weight: 900; }
    </style>

    <rect width="800" height="1000" class="bg"/>

    <text x="250" y="140" class="title">E</text>
    <text x="550" y="140" class="title">D</text>

    <g>
        <path d="M 365 460 L 340 680 L 340 880" stroke-width="46" class="body-line"/>
        <path d="M 435 460 L 460 680 L 460 880" stroke-width="46" class="body-line"/>
        <path d="M 340 860 L 320 890" stroke-width="36" class="body-line"/>
        <path d="M 460 860 L 480 890" stroke-width="36" class="body-line"/>
        <path d="M 330 230 L 260 370 L 245 490" stroke-width="36" class="body-line"/>
