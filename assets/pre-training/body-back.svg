        <path d="M 330 220 Q 400 190 470 220 L 460 460 Q 400 480 340 460 Z" class="body-base"/>
        <line x1="400" y1="160" x2="400" y2="200" stroke-width="36" class="body-line"/>
        <rect x="360" y="60" width="80" height="110" rx="40" class="body-base"/>

        <path d="M 358 100 Q 400 50 442 100 Q 450 130 430 140 Q 400 160 370 140 Z" class="hair"/>
        <line x1="400" y1="230" x2="400" y2="400" stroke-width="3" stroke="#e5e7eb"/>
        <path d="M 342 380 Q 400 390 458 380" class="body-detail"/>
        <path d="M 342 460 Q 400 480 458 460" class="body-detail"/>
        <line x1="400" y1="470" x2="400" y2="390" class="body-detail"/>
    </g>

