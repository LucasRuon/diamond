        .dot { fill: #9ca3af; r: 6; }
        .box { fill: #9ca3af; rx: 20; height: 40px; }
        .txt { fill: #111827; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
        .title { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 28px; font-weight: 900; }
    </style>

